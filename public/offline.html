<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Offline — Habit Tracker</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, system-ui, sans-serif;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #eff6ff, #f8fafc);
        color: #0f172a;
        text-align: center;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        width: 100%;
        padding: 32px;
        border-radius: 28px;
        background: rgba(255,255,255,0.92);
        box-shadow: 0 24px 80px rgba(15,23,42,0.12);
      }
      h1 { margin: 0 0 16px; font-size: 2rem; }
      p { margin: 0 0 24px; color: #475569; line-height: 1.65; }
      a {
        display: inline-flex;
        padding: 12px 22px;
        border-radius: 999px;
        background: #4f46e5;
        color: white;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>
        Habit Tracker is available when you reconnect. Refresh after your connection returns
        or use the app again from your home screen.
      </p>
      <a href="/">Return home</a>
    </div>
  </body>
</html>
