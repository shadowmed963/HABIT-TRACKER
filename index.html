<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Habit Tracker</title>
    <link rel="icon" type="image/png" href="/image.png" />
    <link rel="shortcut icon" type="image/png" href="/image.png" />
    <script>
      // Apply theme class early to avoid FOUC: respect saved `theme` ('light'|'dark'|'system')
      try {
        const t = localStorage.getItem('theme');
        if (t === 'dark') {
          document.documentElement.classList.add('dark');
          document.body && document.body.classList.add('dark');
        } else if (t === 'light') {
          document.documentElement.classList.remove('dark');
          document.body && document.body.classList.remove('dark');
        } else {
          // 'system' or not set — follow OS preference
          const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.classList.toggle('dark', prefersDark);
          document.body && document.body.classList.toggle('dark', prefersDark);
        }
      } catch (e) {
        // ignore
      }
    </script>
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/client/App.tsx"></script>
  </body>
</html>
